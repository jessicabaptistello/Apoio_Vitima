<div class="login-container">
  <div class="login-box">
    <div class="login-header">
      <span class="eyebrow">ACESSO SEGURO</span>
      <h2>Acesso à Plataforma</h2>
      <p class="subtitle">
        Crie a sua conta de forma segura e anónima. Ninguém saberá que está aqui.
      </p>
    </div>

    <div *ngIf="errorMessage" class="error-banner">
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="success-banner">
      {{ successMessage }}
    </div>

    <form (submit)="$event.preventDefault()" novalidate>
      <div class="input-group">
        <label for="nome">Nome Completo (opcional)</label>
        <input
          type="text"
          id="nome"
          name="nomeCompleto"
          [(ngModel)]="nomeCompleto"
          placeholder="Seu nome completo"
          (input)="usarDadosParaLogin()"
        >
      </div>

      <div class="input-group">
        <label for="email">E-mail</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          placeholder="exemplo@email.com"
          (input)="usarDadosParaLogin()"
          #emailModel="ngModel"
          required
          email
        >
        <small class="validation-error" *ngIf="email && emailModel.invalid">
          Introduza um e-mail válido.
        </small>
      </div>

      <div class="input-group">
        <label for="password">Palavra-passe</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Sua senha"
          (input)="usarDadosParaLogin()"
          #passwordModel="ngModel"
          required
          minlength="6"
        >
        <small class="validation-error" *ngIf="password && password.length > 0 && password.length < 6">
          A palavra-passe deve ter pelo menos 6 caracteres.
        </small>
      </div>

      <div class="button-stack">
        <button
          type="button"
          (click)="handleLogin()"
          [disabled]="loadingLogin"
          class="btn-login"
        >
          {{ loadingLogin ? 'A entrar...' : 'Entrar' }}
        </button>

        <button
          type="button"
          (click)="handleSignUp()"
          [disabled]="loadingSignUp"
          class="btn-register"
        >
          {{ loadingSignUp ? 'A criar conta...' : 'Criar nova conta' }}
        </button>
      </div>
    </form>
  </div>
</div>
