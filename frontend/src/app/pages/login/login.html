<div class="login-container">
  <div class="login-box">
    <div class="login-header">
      <span class="eyebrow">ACESSO SEGURO</span>
      <h2>Acesso à Plataforma</h2>
      <p class="subtitle">
        Crie a sua conta de forma segura e anónima. Ninguém saberá que está aqui.
      </p>
    </div>

    <div *ngIf="errorMessage" class="error-banner">
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="success-banner">
      {{ successMessage }}
    </div>

    <form #loginForm="ngForm" (submit)="$event.preventDefault()" novalidate>
      <div class="input-group">
        <label for="nome">Nome Completo (opcional)</label>
        <input
          type="text"
          id="nome"
          name="nomeCompleto"
          [(ngModel)]="nomeCompleto"
          placeholder="Seu nome completo"
          (input)="usarDadosParaLogin()"
        >
      </div>

      <div class="input-group">
        <label for="email">E-mail</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          placeholder="exemplo@email.com"
          (input)="usarDadosParaLogin()"
          #emailModel="ngModel"
          required
          email
          [class.input-invalid]="emailModel.invalid && (emailModel.dirty || emailModel.touched)"
          [class.input-valid]="emailModel.valid && (emailModel.dirty || emailModel.touched)"
        >
        <small class="validation-error" *ngIf="emailModel.invalid && (emailModel.dirty || emailModel.touched)">
          <span *ngIf="emailModel.errors?.['required']">O e-mail é obrigatório.</span>
          <span *ngIf="emailModel.errors?.['email']">Introduza um e-mail válido.</span>
        </small>
      </div>

      <div class="input-group">
        <label for="password">Palavra-passe</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Sua senha"
          (input)="usarDadosParaLogin()"
          #passwordModel="ngModel"
          required
          minlength="6"
          [class.input-invalid]="passwordModel.invalid && (passwordModel.dirty || passwordModel.touched)"
          [class.input-valid]="passwordModel.valid && (passwordModel.dirty || passwordModel.touched)"
        >
        <small class="validation-error" *ngIf="passwordModel.invalid && (passwordModel.dirty || passwordModel.touched)">
          <span *ngIf="passwordModel.errors?.['required']">A palavra-passe é obrigatória.</span>
          <span *ngIf="passwordModel.errors?.['minlength']">A palavra-passe deve ter pelo menos 6 caracteres.</span>
        </small>
      </div>

      <div class="button-stack">
        <button
          type="button"
          (click)="handleLogin()"
          [disabled]="loadingLogin || loginForm.invalid"
          class="btn-login"
          [class.btn-disabled]="loadingLogin || loginForm.invalid"
          [class.btn-enabled]="!(loadingLogin || loginForm.invalid)"
        >
          {{ loadingLogin ? 'A entrar...' : 'Entrar' }}
        </button>

        <button
          type="button"
          (click)="handleSignUp()"
          [disabled]="loadingSignUp || loginForm.invalid"
          class="btn-register"
          [class.btn-disabled]="loadingSignUp || loginForm.invalid"
          [class.btn-enabled-secondary]="!(loadingSignUp || loginForm.invalid)"
        >
          {{ loadingSignUp ? 'A criar conta...' : 'Criar nova conta' }}
        </button>
      </div>
    </form>
  </div>
</div>
