<div class="login-container">
  <div class="login-box">
    <h2>Acesso à Plataforma</h2>
    
    <div *ngIf="errorMessage" class="error-banner" style="color: red; background: #ffeeee; padding: 10px; border-radius: 4px; margin-bottom: 15px; border: 1px solid red;">
      {{ errorMessage }}
    </div>

    <form (submit)="$event.preventDefault()">
      
      <div class="input-group" style="margin-bottom: 15px;">
        <label for="nome">Nome Completo</label>
        <input 
          type="text" 
          id="nome" 
          name="nomeCompleto" 
          [(ngModel)]="nomeCompleto" 
          placeholder="Seu nome completo"
          style="width: 100%; padding: 8px;"
        >
      </div>

      <div class="input-group" style="margin-bottom: 15px;">
        <label for="email">E-mail</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          placeholder="exemplo@email.com"
          style="width: 100%; padding: 8px;"
        >
      </div>

      <div class="input-group" style="margin-bottom: 20px;">
        <label for="password">Palavra-passe</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          placeholder="Sua senha"
          style="width: 100%; padding: 8px;"
        >
      </div>

      <div class="button-stack" style="display: flex; flex-direction: column; gap: 10px;">
        <button 
          type="button" 
          (click)="handleLogin()" 
          [disabled]="loading"
          class="btn-login"
          style="padding: 10px; cursor: pointer;"
        >
          {{ loading ? 'A entrar...' : 'Entrar' }}
        </button>

        <button 
          type="button" 
          (click)="handleSignUp()" 
          [disabled]="loading"
          class="btn-register"
          style="padding: 10px; cursor: pointer;"
        >
          {{ loading ? 'A processar...' : 'Criar nova conta' }}
        </button>
      </div>
    </form>
  </div>
</div>
